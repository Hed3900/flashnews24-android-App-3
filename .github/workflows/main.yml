name: Build Android APK & AAB

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Vite & Capacitor Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Vite App
        run: npm run build

      - name: Run Capacitor Sync
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Verify and Restore Gradle Wrapper
        run: |
          cd android
          mkdir -p gradle/wrapper
          echo "Downloading pristine Gradle 8.14.3 wrapper jar..."
          curl -sSL -o gradle/wrapper/gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar"
          chmod +x gradlew

      - name: Build Android APK (Debug & Release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Build Android App Bundle / AAB (Debug & Release)
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashnews24-apk
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashnews24-aab
          path: android/app/build/outputs/bundle/**/*.aab
          retention-days: 30
