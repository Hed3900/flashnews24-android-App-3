name: Build Android APK & AAB

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch2

jobs:
  build-android:
    name: Build Vite & Capacitor Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Vite App
        run: npm run build

      - name: Run Capacitor Sync
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle
        run: chmod +x android/gradlew

      - name: Build Android APK (Debug & Release)
        run: |
          cd android
          ./gradlew assembleDebug assembleRelease --no-daemon

      - name: Build Android App Bundle / AAB (Debug & Release)
        run: |
          cd android
          ./gradlew bundleDebug bundleRelease --no-daemon

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashnews24-apk
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flashnews24-aab
          path: android/app/build/outputs/bundle/**/*.aab
          retention-days: 30
